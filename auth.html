<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticação - Padaria Portuguesa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="dark-mode.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Saltar para o conteúdo principal</a>
  
  <header class="header">
    <div class="container">
      <div class="header-content">
        <h1 class="logo"><a href="index.html">Padaria Portuguesa</a></h1>
        <nav class="nav">
          <a href="index.html" class="nav-link">Inicio</a>
          <a href="produtos.html" class="nav-link">Produtos</a>
          <a href="como-usar.html" class="nav-link">Como usar</a>
          <a href="receitas.html" class="nav-link">Receitas</a>
          <a href="sobre.html" class="nav-link">Sobre</a>
          <a href="orders.html" class="nav-link">Encomendas</a>
          <button id="theme-toggle" class="theme-toggle" title="Alternar modo escuro" aria-label="Alternar tema">🌙</button>
        </nav>
      </div>
    </div>
  </header>

  <main class="main auth-main" id="main-content">
    <div class="auth-container">
      <div class="auth-header">
        <h2 class="auth-title">Padaria Portuguesa</h2>
        <p class="auth-subtitle">Entre ou crie uma conta para continuar</p>
      </div>

      <div class="tabs-auth">
        <button class="tab-auth-btn active" data-tab="login">Entrar</button>
        <button class="tab-auth-btn" data-tab="register">Registar</button>
      </div>

      <!-- Login Form -->
      <div id="login-tab" class="tab-content-auth active">
        <div class="card">
          <h3 class="card-title">Entrar na conta</h3>
          <p class="card-description">Introduza as suas credenciais para aceder</p>
          
          <form id="login-form" class="auth-form">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" placeholder="joao@exemplo.com" required>
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Entrar</button>
          </form>
        </div>
      </div>

      <!-- Register Form -->
      <div id="register-tab" class="tab-content-auth">
        <div class="card">
          <h3 class="card-title">Criar conta</h3>
          <p class="card-description">Preencha os dados para criar a sua conta</p>
          
          <form id="register-form" class="auth-form">
            <div class="form-group">
              <label for="register-name">Nome completo</label>
              <input type="text" id="register-name" placeholder="João Silva" required>
            </div>
            <div class="form-group">
              <label for="register-email">Email</label>
              <input type="email" id="register-email" placeholder="joao@exemplo.com" required>
            </div>
            <div class="form-group">
              <label for="register-phone">Número de telefone</label>
              <input type="tel" id="register-phone" placeholder="912345678" inputmode="numeric" maxlength="9" minlength="9" pattern="[0-9]{9}" required>
            </div>
            <div class="form-group">
              <label for="register-password">Password</label>
              <input type="password" id="register-password" required minlength="6">
            </div>
            <div class="form-group">
              <label for="register-confirm-password">Confirmar Password</label>
              <input type="password" id="register-confirm-password" required minlength="6">
            </div>
            <button type="submit" class="btn-primary btn-full">Criar conta</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
